<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PEDIDOS CONWAY FRESCOS (203324)</title>
<style>
:root{--bg:#F5F5F3;--card:#FFF;--border:#E4E4E0;--text:#1E1E1C;--text2:#6E6E69;--text3:#A0A09A;--blue:#185FA5;--blue-bg:#E6F1FB;--red:#C0392B;--red-bg:#FCEBEB;--orange:#BA7517;--orange-bg:#FAEEDA;--green:#3B6D11;--green-bg:#EAF3DE;--r:12px;--r2:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);}
.app{max-width:390px;margin:0 auto;min-height:100vh;}
.header{background:var(--card);border-bottom:0.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.header h1{font-size:18px;font-weight:700;color:var(--text);}
.tabs{display:flex;gap:3px;}
.tab{padding:6px 10px;font-size:12px;font-weight:600;border-radius:var(--r2);border:none;cursor:pointer;background:transparent;font-family:inherit;color:var(--text2);touch-action:manipulation;}
.tab.active{background:var(--text);color:#fff;}
.view{display:none;padding:16px;}
.view.active{display:block;}
.stitle{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;}
.ssub{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:18px;}
.card{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);padding:14px;margin-bottom:8px;}
.slbl{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px;}
/* flujo */
.fsteps{display:flex;flex-direction:column;}
.fstep{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;background:var(--card);border:0.5px solid var(--border);}
.fstep:first-child{border-radius:var(--r) var(--r) 0 0;}
.fstep:last-child{border-radius:0 0 var(--r) var(--r);border-top:none;}
.fstep:not(:first-child):not(:last-child){border-top:none;}
.fnum{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}
.nb{background:var(--blue-bg);color:var(--blue);}
.ng{background:var(--bg);color:var(--text3);}
.ftxt{font-size:13px;font-weight:600;color:var(--text);}
.fsub{font-size:11px;color:var(--text2);margin-top:2px;}
/* modo cards */
.mcard{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);padding:13px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;margin-bottom:8px;touch-action:manipulation;}
.mcard.sel{border:2px solid var(--blue);}
.mico{width:36px;height:36px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.mib{background:var(--blue-bg);color:var(--blue);}
.mig{background:var(--bg);color:var(--text2);}
.mct{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
.mcd{font-size:12px;color:var(--text2);line-height:1.4;}
/* btns */
.btn{width:100%;padding:13px;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;border:none;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;touch-action:manipulation;-webkit-appearance:none;}
.btn:active{opacity:.8;}
.btn-k{background:var(--text);color:#fff;}
.btn-w{background:var(--card);color:var(--text2);border:0.5px solid var(--border)!important;}
.btn-b{background:var(--blue);color:#fff;}
.btn-r{background:var(--red);color:#fff;}
.btn-sm{padding:10px 14px;font-size:13px;width:auto;margin-bottom:0;}
/* paso */
.pbar{height:3px;background:var(--border);border-radius:2px;margin-bottom:12px;overflow:hidden;}
.pfill{height:100%;border-radius:2px;transition:width .3s;}
.pblue{background:var(--blue);}
.pblack{background:var(--text);}
.pcnt{font-size:12px;color:var(--text2);text-align:center;margin-bottom:6px;}
.sbadge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:8px;}
.sbb{background:var(--blue-bg);color:var(--blue);}
.sbk{background:var(--bg);color:var(--text2);}
.sbg{background:var(--green-bg);color:var(--green);}
.pcard{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);padding:22px 18px;text-align:center;margin-bottom:14px;display:flex;flex-direction:column;align-items:center;min-height:170px;justify-content:center;}
.pnom{font-size:17px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:3px;}
.pmet{font-size:12px;color:var(--text2);margin-bottom:16px;}
.binp{font-size:48px;font-weight:700;color:var(--text);border:none;border-bottom:2.5px solid var(--text);background:transparent;text-align:center;width:130px;padding:4px 0;font-family:inherit;outline:none;-webkit-appearance:none;}
.binp::placeholder{color:var(--border);}
.binp.ed{border-bottom-color:var(--blue);color:var(--blue);}
.phint{font-size:12px;color:var(--text2);margin-top:8px;}
.ehint{font-size:12px;color:var(--blue);margin-top:8px;}
.navg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.bsec{padding:13px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;touch-action:manipulation;-webkit-appearance:none;}
.bsec:disabled{opacity:.3;cursor:default;}
.bsec:active{opacity:.7;}
.bcan{padding:13px;background:var(--card);border:0.5px solid var(--red);border-radius:var(--r);font-size:13px;color:var(--red);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px;font-weight:700;touch-action:manipulation;-webkit-appearance:none;}
.bcan:active{opacity:.7;}
.hint{font-size:12px;color:var(--text2);text-align:center;}
.done{padding:36px 20px;text-align:center;}
.dtit{font-size:20px;font-weight:700;color:var(--text);margin:12px 0 6px;}
.dsub{font-size:14px;color:var(--text2);margin-bottom:24px;}
/* pedido */
.ibadges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.ibadge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;}
.ibb{background:var(--blue-bg);color:var(--blue);}
.ibg{background:var(--bg);color:var(--text2);}
.resbox{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);padding:14px;margin-bottom:10px;}
.resgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;}
.rnum{font-size:24px;font-weight:800;}
.rlbl{font-size:11px;color:var(--text2);margin-top:2px;}
.psec{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);margin-bottom:8px;overflow:hidden;}
.prow{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--border);}
.prow:last-child{border-bottom:none;}
.pnm{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.pmt{font-size:11px;color:var(--text2);}
.pct{font-size:14px;font-weight:800;color:var(--text);margin:0 8px;}
.pbg{font-size:10px;padding:2px 8px;border-radius:var(--r2);flex-shrink:0;font-weight:700;}
.brc{background:var(--red-bg);color:#7B1F1F;}
.brw{background:var(--orange-bg);color:#5C3407;}
.brg{background:var(--green-bg);color:var(--green);}
.brx{background:#EEF0F2;color:#555;}
/* productos */
.pitem-wrap{position:relative;overflow:hidden;border-radius:var(--r);margin-bottom:6px;}
.pitem-bg{position:absolute;inset:0;background:var(--red);display:flex;align-items:center;justify-content:flex-end;padding-right:22px;color:#fff;font-size:13px;font-weight:700;border-radius:var(--r);}
.pitem{background:var(--card);border:0.5px solid var(--border);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;transition:transform .2s;border-radius:var(--r);user-select:none;-webkit-user-select:none;}
.piinfo{flex:1;min-width:0;}
.pinm{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.piun{font-size:11px;color:var(--text2);margin-top:2px;}
.piconfirm{background:var(--red-bg);border:1.5px solid var(--red);border-radius:var(--r);padding:11px 14px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.piconfirm-txt{font-size:12px;color:var(--red);font-weight:700;flex:1;line-height:1.3;}
.piconfirm-btns{display:flex;gap:6px;flex-shrink:0;}
.pbtn-si{background:var(--red);color:#fff;border:none;border-radius:var(--r2);padding:9px 16px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;touch-action:manipulation;-webkit-appearance:none;}
.pbtn-no{background:var(--card);color:var(--text2);border:0.5px solid var(--border);border-radius:var(--r2);padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;touch-action:manipulation;-webkit-appearance:none;}
.finput{padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r2);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;width:100%;}
.finput:focus{border-color:var(--blue);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.flbl{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:4px;}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30;overflow-y:auto;}
.modal{background:var(--card);margin:16px 12px 32px;border-radius:var(--r);overflow:hidden;}
.mhead{padding:15px 16px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.mhead h2{font-size:15px;font-weight:700;color:var(--text);}
.mclose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);padding:0 4px;touch-action:manipulation;}
.mbody{padding:14px 16px;overflow-x:auto;}
.mfoo{padding:12px 16px 16px;border-top:0.5px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.mfbtn{width:100%;padding:12px;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;touch-action:manipulation;-webkit-appearance:none;}
.mfbtn:active{opacity:.8;}
.mfk{background:var(--text);color:#fff;border:none;}
.mfw{background:transparent;color:var(--text2);border:0.5px solid var(--border);}
.wbox{background:var(--orange-bg);color:#5C3407;border-radius:var(--r2);padding:10px 12px;font-size:12px;line-height:1.4;}
.ptable{width:100%;border-collapse:collapse;font-size:12px;}
.ptable th{text-align:left;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;padding:5px;border-bottom:0.5px solid var(--border);}
.ptable td{padding:7px 5px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle;}
.ptable tr:last-child td{border-bottom:none;}
.ptable td:last-child,.ptable th:last-child{text-align:right;font-weight:700;}
.pmeta{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6;}
/* historial */
.hitem{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);margin-bottom:8px;overflow:hidden;}
.hitem-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.hitem-date{font-size:13px;font-weight:700;color:var(--text);}
.hitem-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.hitem-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
.hitem-body{border-top:0.5px solid var(--border);padding:12px 14px;display:none;}
.hitem-body.open{display:block;}
.htable{width:100%;border-collapse:collapse;font-size:12px;}
.htable td{padding:6px 4px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle;}
.htable tr:last-child td{border-bottom:none;}
.htable td:last-child{text-align:right;font-weight:700;}
.hdel{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:2px 4px;flex-shrink:0;touch-action:manipulation;line-height:1;}
.hdel:active{color:var(--red);}
.hempty{text-align:center;padding:40px 20px;color:var(--text2);}
/* calc */
.calc-section{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);padding:14px;margin-bottom:10px;}
.calc-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;}
.calc-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:12px;}
.calc-field{margin-bottom:10px;}
.calc-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
.calc-input{padding:10px 12px;border:0.5px solid var(--border);border-radius:var(--r2);font-size:16px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;width:100%;font-weight:600;}
.calc-input:focus{border-color:var(--blue);}
.calc-input-euro{position:relative;}
.calc-input-euro::before{content:"€";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text2);font-weight:600;}
.calc-input-euro input{padding-left:28px;}
.resultado-box{background:var(--blue-bg);border:1.5px solid var(--blue);border-radius:var(--r);padding:14px;margin-bottom:8px;}
.resultado-titulo{font-size:12px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.resultado-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.resultado-item{background:var(--card);border-radius:var(--r2);padding:10px;}
.resultado-num{font-size:22px;font-weight:800;color:var(--blue);}
.resultado-lbl{font-size:11px;color:var(--text2);margin-top:2px;}
.resultado-factor{font-size:12px;color:var(--blue);margin-top:6px;line-height:1.5;}
.prod-calc-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.prod-calc-table th{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;padding:5px 4px;border-bottom:0.5px solid var(--border);text-align:left;}
.prod-calc-table td{padding:7px 4px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:middle;}
.prod-calc-table tr:last-child td{border-bottom:none;}
.prod-calc-table td:last-child{text-align:right;font-weight:700;color:var(--blue);}
.par-nuevo-badge{display:inline-block;background:var(--green-bg);color:var(--green);font-size:10px;font-weight:700;padding:1px 6px;border-radius:var(--r2);margin-left:4px;}
.par-igual-badge{display:inline-block;background:var(--bg);color:var(--text3);font-size:10px;font-weight:700;padding:1px 6px;border-radius:var(--r2);margin-left:4px;}
.par-up{color:var(--green);font-weight:800;}
.par-down{color:var(--red);font-weight:800;}
.warn-calc{background:var(--orange-bg);color:#5C3407;border-radius:var(--r2);padding:8px 12px;font-size:12px;line-height:1.4;margin-bottom:8px;}
/* consumo */
.cons-step{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);padding:14px;margin-bottom:10px;}
.cons-step-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.cons-step-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:0;}
.cons-num{width:22px;height:22px;border-radius:50%;background:var(--blue-bg);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.cons-pcard{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);padding:24px 18px;text-align:center;margin-bottom:14px;display:flex;flex-direction:column;align-items:center;min-height:200px;justify-content:center;}
.cons-pnom{font-size:17px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px;}
.cons-pmet{font-size:12px;color:var(--text2);margin-bottom:16px;}
.cons-formula{background:var(--blue-bg);border-radius:var(--r2);padding:8px 12px;font-size:12px;color:var(--blue);font-weight:600;margin-top:10px;line-height:1.6;text-align:left;width:100%;}
.cons-result-box{background:var(--card);border-radius:var(--r);border:0.5px solid var(--border);margin-bottom:8px;overflow:hidden;}
.cons-result-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--border);}
.cons-result-row:last-child{border-bottom:none;}
.cons-rnom{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.cons-rmet{font-size:11px;color:var(--text2);}
.cons-rcant{font-size:14px;font-weight:800;color:var(--blue);margin:0 8px;}
.cons-badge-ok{background:var(--green-bg);color:var(--green);font-size:10px;padding:2px 7px;border-radius:var(--r2);font-weight:700;}
.cons-badge-cero{background:var(--bg);color:var(--text3);font-size:10px;padding:2px 7px;border-radius:var(--r2);font-weight:700;}
/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 22px;border-radius:var(--r);font-size:14px;font-weight:600;z-index:50;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1 style="font-size:13px;line-height:1.2">PEDIDOS CONWAY<br>FRESCOS (203324)</h1>
    <div class="tabs">
      <button class="tab active" id="tab-inv">Inventario</button>
      <button class="tab" id="tab-ped">Pedido</button>
      <button class="tab" id="tab-cons">Consumo</button>
      <button class="tab" id="tab-prod">Productos</button>
      <button class="tab" id="tab-hist">Historial</button>
      <button class="tab" id="tab-hpar">PARs</button>
      <button class="tab" id="tab-calc">Calcular</button>
    </div>
  </div>
  <div class="view active" id="view-inv"></div>
  <div class="view" id="view-ped"></div>
  <div class="view" id="view-cons"></div>
  <div class="view" id="view-prod"></div>
  <div class="view" id="view-hist"></div>
  <div class="view" id="view-hpar"></div>
  <div class="view" id="view-calc"></div>
  <div id="mwrap" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>
 
<script>
// ── DATA ──
var DEFAULTS=[
  {n:"Cebolla Roja 1Kg Bolsa",u:"bolsa"},{n:"Calabacin 2Kg Bolsa",u:"bolsa"},
  {n:"Pimiento Verde 1Kg Bolsa",u:"bolsa"},{n:"Pimiento Rojo 1Kg Bolsa",u:"bolsa"},
  {n:"Zanahoria Bolsa 500g",u:"bolsa"},{n:"Lima Bolsa 1Kg",u:"bolsa"},
  {n:"Limones Kg",u:"kg"},{n:"Tomate Cherry barqueta 250gr",u:"barqueta"},
  {n:"Naranja Zumo F/Bolsa",u:"bolsa"},{n:"Es Flo Ens. Mezclum 500G/4",u:"bandeja"},
  {n:"Es Flo Ens. Romana 500G/4",u:"bandeja"},{n:"Manzana Golden F/Bolsa",u:"bolsa"},
  {n:"Berenjena Bolsa 2Kg",u:"bolsa"},{n:"Champiñon Laminado Kg",u:"kg"},
  {n:"Fresa Tarrina 500gr",u:"tarrina"},{n:"Es Flo Rucula 4x100gr",u:"bandeja"},
  {n:"Tarrina Eneldo 20gr",u:"tarrina"},{n:"Tomate Ensalada Caja 6Kg",u:"caja"},
  {n:"Pera Conferencia Bolsa",u:"bolsa"},{n:"Cogollos Bandeja 3 UDS (400Gr)",u:"bandeja"},
  {n:"Tomate Kumato Bolsa 1Kg",u:"bolsa"},{n:"Salvia Fresca 40Gr",u:"tarrina"},
  {n:"Romero 40grs Bolsa",u:"bolsa"},{n:"Perejil Bolsa 80g",u:"bolsa"},
  {n:"Hierbabuena 40g",u:"bolsa"}
];
 
var prods, fase, modo;
var historial=[];
var historialPar=[];
function loadAll(){
  try{ prods=JSON.parse(localStorage.getItem('gp')||'null')||DEFAULTS.map(function(d){return{nombre:d.n,unidad:d.u,exi:null,par:0,parAnt:0};}); }
  catch(e){ prods=DEFAULTS.map(function(d){return{nombre:d.n,unidad:d.u,exi:null,par:0,parAnt:0};}); }
  try{ var st=JSON.parse(localStorage.getItem('gst')||'null')||{}; fase=st.fase||'inicio'; modo=st.modo||null; }
  catch(e){ fase='inicio'; modo=null; }
  try{ historial=JSON.parse(localStorage.getItem('ghist')||'[]'); }
  catch(e){ historial=[]; }
  try{ historialPar=JSON.parse(localStorage.getItem('ghpar')||'[]'); }
  catch(e){ historialPar=[]; }
}
function saveHist(){ try{localStorage.setItem('ghist',JSON.stringify(historial));}catch(e){} }

function ped(p){ return Math.max(0,(p.par||0)-(p.exi||0)); }
function sta(p){ if(p.exi===null)return'e'; if(p.exi<=0)return'c'; if(p.par>0&&p.exi<p.par)return'l'; if(p.par>0&&p.exi>=p.par)return'x'; return'o'; }
function wk(){ var d=new Date(),j=new Date(d.getFullYear(),0,1); return Math.ceil(((d-j)/86400000+j.getDay()+1)/7); }
function fd(){ return new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }

    +'</div>'

function gv(){ var i=el('mi'); return i?i.value:''; }
 
function cancelar(){
  if(!confirm('Cancelar y empezar desde el principio?'))return;
  if(fase==='par') prods.forEach(function(p){p.par=p.parAnt||0;});

function renderPAR(){
  var idx=prods.findIndex(function(p){return p.par===null;});
  if(idx<0){prods.forEach(function(p){p.exi=null;});fase='exi';saveAll();renderEXI();return;}
  var p=prods[idx], dc=prods.filter(function(x){return x.par!==null;}).length;
  tarjeta({pc:'pblue',sc:'sbb',label:'Paso 1 - PAR',nombre:p.nombre,
    meta:p.unidad+(p.parAnt>0?' | Anterior: '+p.parAnt:''),
    val:null,ed:false,hint:'Cantidad optima a tener',
    noprev:!prods.slice(0,idx).some(function(x){return x.par!==null;}),
    dc:dc,total:prods.length,
    next:function(){var v=gv();prods[idx].par=v===''?(p.parAnt||0):parseFloat(v)||0;saveAll();renderPAR();},
    skip:function(){prods[idx].par=p.parAnt||0;saveAll();renderPAR();},
    prev:function(){var v=gv();prods[idx].par=v===''?null:parseFloat(v)||0;
      var pi=-1;for(var i=idx-1;i>=0;i--){if(prods[i].par!==null){pi=i;break;}}
      if(pi<0)return;renderPARedit(pi);}
  });
}

  var p=prods[idx], dc=prods.filter(function(x){return x.par!==null;}).length;

    skip:function(){prods[idx].par=p.parAnt||0;saveAll();renderPAR();},
    prev:function(){var v=gv();prods[idx].par=v===''?p.par:parseFloat(v)||0;saveAll();

      if(pi<0)return;renderPARedit(pi);}
  });
}

          +'<span class="pbg '+bc+'">'+bt+'</span></div></div>';}).join('')
      +'</div>';
  }

  var ex=prods.filter(function(p){return p.exi!==null && p.par>0 && p.exi>=p.par;});
  vp.innerHTML='<div class="ibadges"><span class="ibadge ibb">'+(modo==='nuevo'?'PAR nuevo':'PAR anterior')+'</span>'

    +'<div><div class="rnum" style="color:var(--orange)">'+lw.length+'</div><div class="rlbl">Bajo minimo</div></div>'
    +'<div><div class="rnum" style="color:var(--green)">'+ok.length+'</div><div class="rlbl">Reposicion</div></div>'
    +'</div></div>'

    +'<button class="btn btn-w" id="btn-cpy">📋 Copiar como texto</button>'
    +(!tp.length && !ex.length?'<div style="text-align:center;padding:20px;color:var(--text2)">No hay pedidos necesarios ✅</div>'
      :grp(cr,'Sin stock','brc','urgente')+grp(lw,'Bajo minimo','brw','bajo')+grp(ok,'Reposicion','brg','normal')+grp(ex,'No se pide','brx','exceso de stock','exceso'))
    +'<div style="height:16px"></div>';

function renderProd(){
  var vp=el('view-prod');
  vp.innerHTML='<div class="sbadge sbg" style="margin-bottom:12px">📦 '+prods.length+' productos</div>'
    +'<div class="card">'
    +'<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px">Añadir nuevo producto</div>'
    +'<div style="margin-bottom:10px"><div class="flbl">Nombre</div>'
    +'<input class="finput" id="np-n" type="text" placeholder="ej. Aguacate Bolsa 1Kg"></div>'
    +'<div class="frow"><div><div class="flbl">Unidad</div>'
    +'<input class="finput" id="np-u" type="text" placeholder="bolsa, kg..."></div>'
    +'<div><div class="flbl">PAR inicial</div>'
    +'<input class="finput" id="np-p" type="number" min="0" inputmode="numeric" placeholder="0"></div></div>'
    +'<button class="btn btn-k" id="btn-add" style="margin-bottom:0">+ Añadir</button>'
    +'</div>'
    +'<div class="slbl" style="margin-top:16px">Desliza a la izquierda para eliminar</div>'
    +'<div id="plist"></div>'
    +'<div style="height:16px"></div>';
 
  var pl=el('plist');
  for(var i=0;i<prods.length;i++){
    (function(idx){
      // wrapper with red background showing on swipe
      var wrap=document.createElement('div');
      wrap.className='pitem-wrap';
 
      var bg=document.createElement('div');
      bg.className='pitem-bg';
      bg.textContent='Eliminar';
      wrap.appendChild(bg);
 
      var row=document.createElement('div');
      row.className='pitem';
      row.innerHTML='<div class="piinfo"><div class="pinm">'+prods[idx].nombre+'</div>'
        +'<div class="piun">'+prods[idx].unidad+'</div></div>';
      wrap.appendChild(row);
      pl.appendChild(wrap);
 
      // swipe logic
      var startX=0, currentX=0, swiping=false, revealed=false;
      var threshold=80; // px to trigger
 
      function setTranslate(x){
        row.style.transform='translateX('+x+'px)';
      }
 
      row.addEventListener('touchstart',function(e){
        startX=e.touches[0].clientX;
        currentX=startX;
        swiping=true;
      },{passive:true});
 
      row.addEventListener('touchmove',function(e){
        if(!swiping)return;
        currentX=e.touches[0].clientX;
        var dx=currentX-startX;
        if(dx<0){
          setTranslate(Math.max(dx,-120));
        } else if(revealed){
          setTranslate(Math.min(dx-120,0));
        }
      },{passive:true});
 
      row.addEventListener('touchend',function(){
        if(!swiping)return;
        swiping=false;
        var dx=currentX-startX;
        if(!revealed && dx<-threshold){
          // snap open
          setTranslate(-100);
          revealed=true;
        } else if(revealed && dx>threshold){
          // snap closed
          setTranslate(0);
          revealed=false;
        } else if(revealed){
          setTranslate(-100);
        } else {
          setTranslate(0);
        }
      });
 
      // tap on red area = show inline confirm
      bg.addEventListener('click',function(){
        showConfirm(idx, wrap);
      });
      bg.addEventListener('touchend',function(e){
        e.preventDefault();
        showConfirm(idx, wrap);
      });
    })(i);
  }
 
  el('btn-add').addEventListener('click',function(){
    var n=el('np-n').value.trim();
    var u=el('np-u').value.trim()||'ud';
    var p=parseFloat(el('np-p').value)||0;
    if(!n){el('np-n').focus();toast('Introduce el nombre');return;}
    prods.push({nombre:n,unidad:u,exi:null,par:p,parAnt:p});
    saveP();
    toast('Añadido: '+n);
    renderProd();
  });
}
 
function showConfirm(idx, wrap){
  // replace wrap with confirm panel
  var conf=document.createElement('div');
  conf.className='piconfirm';
  conf.innerHTML='<div class="piconfirm-txt">Eliminar<br><b>'+prods[idx].nombre+'</b>?</div>'
    +'<div class="piconfirm-btns">'
    +'<button class="pbtn-no" id="conf-no">Cancelar</button>'
    +'<button class="pbtn-si" id="conf-si">Eliminar</button>'
    +'</div>';
  wrap.replaceWith(conf);
 
  conf.querySelector('#conf-no').addEventListener('click',function(){
    renderProd();
  });
  conf.querySelector('#conf-si').addEventListener('click',function(){
    prods.splice(idx,1);
    saveP();
    toast('Producto eliminado');
    renderProd();
  });
  // also touchend for iOS
  conf.querySelector('#conf-si').addEventListener('touchend',function(e){
    e.preventDefault();
    prods.splice(idx,1);
    saveP();
    toast('Producto eliminado');
    renderProd();
  });
}

function cerrarModal(){el('mwrap').style.display='none';el('mwrap').innerHTML='';}
function cerrarSemana(){
  var tp=prods.filter(function(p){return ped(p)>0&&p.exi!==null;});
  var fechaHoy=new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var semanaNum=wk();
  var modoLabel=modo==='nuevo'?'PAR nuevo':'PAR anterior';
 
  // Save pedido to historial
  if(tp.length>0){
    var entrada={
      id: Date.now(),
      fecha: fechaHoy,
      semana: semanaNum,
      modo: modoLabel,
      total: tp.length,
      urgentes: tp.filter(function(p){return sta(p)==='c';}).length,
      items: tp.map(function(p){return{nombre:p.nombre,unidad:p.unidad,exi:p.exi,par:p.par,cantidad:ped(p),estado:sta(p)};})
    };
    historial.unshift(entrada);
    if(historial.length>45) historial=historial.slice(0,45);
    saveHist();
  }
 
  // Save PARs snapshot to historial PAR
  var parSnap={
    id: Date.now()+1,
    fecha: fechaHoy,
    semana: semanaNum,
    modo: modoLabel,
    pars: prods.filter(function(p){return p.par>0;}).map(function(p){
      return {nombre:p.nombre,unidad:p.unidad,par:p.par};
    })
  };
  historialPar.unshift(parSnap);
  if(historialPar.length>45) historialPar=historialPar.slice(0,45);
  saveHistPar();
 
  prods.forEach(function(p){p.exi=null;p.parAnt=p.par||0;});
  fase='inicio';modo=null;saveAll();cerrarModal();showTab('inv');renderInicio();toast('Semana cerrada y guardada!');
}

var consPars=[]; // {nombre, unidad, stockAnt, pedidoAnt, stockAct}
var consCursor=0;
var consStep='intro';
 
function saveConsPars(){ try{localStorage.setItem('gcons',JSON.stringify({pars:consPars,step:consStep,cursor:consCursor}));}catch(e){} }
function loadConsPars(){
  try{
    var s=JSON.parse(localStorage.getItem('gcons')||'null');
    if(s){ consPars=s.pars||[]; consStep=s.step||'intro'; consCursor=s.cursor||0; }
    else{ consStep='intro'; consPars=[]; consCursor=0; }
  }catch(e){ consStep='intro'; consPars=[]; consCursor=0; }
}
 
function renderCons(){
  loadConsPars();
  if(consStep==='input' && consPars.length) renderConsInput();
  else if(consStep==='result' && consPars.length) renderConsResult();
  else renderConsIntro();
}
 
function buildConsParsSinHistorial(){
  // No historial: user will need to input manually — show warning
  return prods.map(function(p){
    return {nombre:p.nombre,unidad:p.unidad,stockAnt:null,pedidoAnt:null,stockAct:null,manual:true};
  });
}
 
function buildConsParsDesdePedido(lastPed, prevPed){
  // lastPed = last historial entry (this has stockAnt = EXI at time of order, pedidoAnt = cantidad)
  // Build map: nombre -> {stockAnt, pedidoAnt}
  var map={};
  // stockAnt = stock that was there when last order was made (exi field in historial items)
  lastPed.items.forEach(function(item){
    map[item.nombre]={stockAnt:item.exi, pedidoAnt:item.cantidad};
  });
  return prods.map(function(p){
    var ref=map[p.nombre]||{stockAnt:0,pedidoAnt:0};
    return {nombre:p.nombre,unidad:p.unidad,
      stockAnt:ref.stockAnt, pedidoAnt:ref.pedidoAnt,
      stockAct:null, manual:false};
  });
}

      +'<div class="hitem-date">Semana '+h.semana+' — '+h.modo+'</div>'
      +'<div class="hitem-sub">'+h.fecha+'</div>'
      +'<div class="hitem-badges"><span class="pbg brg">'+h.pars.length+' productos</span></div>'
      +'</div>'
      +'<button class="hdel" id="hpdel-'+hi+'">🗑</button>'
      +'</div>'
      +'<div class="hitem-body" id="hpb-'+hi+'">'
      +'<table class="prod-calc-table"><thead>'
      +'<tr><th>Producto</th><th style="text-align:right">PAR usado</th></tr>'
      +'</thead><tbody>'
      +h.pars.map(function(p){
        return '<tr><td>'+p.nombre+'<br><span style="font-size:10px;color:var(--text2)">'+p.unidad+'</span></td>'
          +'<td style="text-align:right;font-weight:700;color:var(--blue)">'+p.par+'</td></tr>';
      }).join('')
      +'</tbody></table>'
      +'</div></div>';
  });
  vh.innerHTML=html;
 
  historialPar.forEach(function(h,hi){
    var head=el('hph-'+hi);
    var body=el('hpb-'+hi);
    if(head) head.addEventListener('click',function(e){
      if(e.target.closest('.hdel')) return;
      body.classList.toggle('open');
    });
    var del=el('hpdel-'+hi);
    if(del){
      del.addEventListener('click',function(e){
        e.stopPropagation();
        showDelHistParConfirm(hi);
      });
    }
  });
}
 
function showDelHistParConfirm(hi){
  var h=historialPar[hi];
  var item=el('hph-'+hi);
  if(!item) return;
  var wrap=item.closest('.hitem');
  if(!wrap) return;
  var conf=document.createElement('div');
  conf.className='piconfirm';
  conf.style.marginBottom='8px';
  conf.innerHTML='<div class="piconfirm-txt">Borrar PARs<br><b>Semana '+h.semana+' — '+h.fecha+'</b>?</div>'
    +'<div class="piconfirm-btns">'
    +'<button class="pbtn-no" id="hpno">Cancelar</button>'
    +'<button class="pbtn-si" id="hpsi">Borrar</button>'
    +'</div>';
  wrap.replaceWith(conf);
  conf.querySelector('#hpno').addEventListener('click',function(){ renderHistPar(); });
  function doDel(e){ if(e) e.preventDefault(); historialPar.splice(hi,1); saveHistPar(); toast('Borrado'); renderHistPar(); }
  conf.querySelector('#hpsi').addEventListener('click',doDel);
  conf.querySelector('#hpsi').addEventListener('touchend',doDel);
}
 
// ── CALCULADORA PAR ──
// calcPars stores {nombre, unidad, par} for calc reference
var calcPars = [];
var calcStep = 1; // 1=intro ventas, 2=intro PARs producto a producto, 3=resultado
 
function renderCalc(){
  var saved = null;
  try{ saved=JSON.parse(localStorage.getItem('gcalc')||'null'); }catch(e){}
  if(saved){ calcPars=saved.pars||[]; }
 
  var vc=el('view-calc');
  var hasParsGuardados = calcPars.length>0;
 
  vc.innerHTML=
    '<div class="stitle">Calculadora PAR ideal</div>'
    +'<div class="ssub">Introduce el PAR de referencia de tus productos, la venta para la que está calculado y la venta objetivo para obtener el PAR ideal.</div>'
 
    +'<div class="calc-section">'
    +'<div class="calc-title">📊 Ventas de referencia</div>'
    +'<div class="calc-field"><div class="calc-label">Venta semanal base (€) — para la que tienes el PAR actual</div>'
    +'<div class="calc-input-euro"><input class="calc-input" id="c-vbase" type="number" min="0" inputmode="decimal" placeholder="ej. 8000"></div></div>'
    +'<div class="calc-field"><div class="calc-label">Venta semanal objetivo (€)</div>'
    +'<div class="calc-input-euro"><input class="calc-input" id="c-vobj" type="number" min="0" inputmode="decimal" placeholder="ej. 10000"></div></div>'
    +'</div>'
 
    +'<div class="calc-section">'
    +'<div class="calc-title">📦 PAR de referencia por producto</div>'
    +'<div class="calc-desc">Introduce el PAR actual de cada producto (el que usas para la venta base indicada arriba).</div>'
    +(hasParsGuardados?'<div class="warn-calc" style="background:var(--green-bg);color:var(--green);border-color:var(--green)">✓ Tienes '+calcPars.length+' productos con PAR guardado. Puedes recalcular o modificarlos.</div>':'')
    +'<div id="calc-par-list"></div>'
    +'<button class="btn btn-w" id="btn-cargar-pars" style="margin-top:4px">📋 Cargar PARs desde el inventario actual</button>'
    +'</div>'
 
    +'<button class="btn btn-b" id="btn-calcular">Calcular PAR ideal ▶</button>'
    +'<div id="calc-resultado"></div>'
    +'<div style="height:16px"></div>';
 
  renderCalcParList();
 
  el('btn-cargar-pars').addEventListener('click', function(){
    calcPars = prods.filter(function(p){return p.par>0;}).map(function(p){
      return {nombre:p.nombre, unidad:p.unidad, par:p.par};
    });
    saveCalcPars();
    renderCalcParList();
    toast('PARs cargados desde inventario');
  });
 
  el('btn-calcular').addEventListener('click', calcularPAR);
}
 
function renderCalcParList(){
  var list = el('calc-par-list');
  if(!list) return;
 
  if(!calcPars.length){
    // show all products as inputs
    calcPars = prods.map(function(p){
      return {nombre:p.nombre, unidad:p.unidad, par:p.par||0};
    });
  }
 
  var html='<table class="prod-calc-table"><thead>'
    +'<tr><th>Producto</th><th style="text-align:right">PAR base</th></tr>'
    +'</thead><tbody>';
 
  calcPars.forEach(function(p, i){
    html+='<tr>'
      +'<td>'+p.nombre+'<br><span style="font-size:10px;color:var(--text2)">'+p.unidad+'</span></td>'
      +'<td style="text-align:right">'
      +'<input type="number" min="0" inputmode="numeric" id="cpar-'+i+'" value="'+(p.par||'')+'" placeholder="0" '
      +'style="width:64px;padding:6px 8px;border:0.5px solid var(--border);border-radius:var(--r2);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);text-align:center;font-weight:700;">'
      +'</td></tr>';
  });
 
  html+='</tbody></table>';
  list.innerHTML=html;
 
  // save on change
  calcPars.forEach(function(p, i){
    var inp=el('cpar-'+i);
    if(inp){
      inp.addEventListener('change',function(){
        calcPars[i].par=parseFloat(this.value)||0;
        saveCalcPars();
      });
    }
  });
}
 
function saveCalcPars(){
  try{localStorage.setItem('gcalc',JSON.stringify({pars:calcPars}));}catch(e){}
}
 
function calcularPAR(){
  // save current par inputs first
  calcPars.forEach(function(p,i){
    var inp=el('cpar-'+i);
    if(inp) p.par=parseFloat(inp.value)||0;
  });
  saveCalcPars();
 
  var vbase=parseFloat(el('c-vbase').value)||0;
  var vobj=parseFloat(el('c-vobj').value)||0;
 
  if(!vbase||!vobj){ toast('Introduce ambas ventas'); return; }
  if(vbase<=0||vobj<=0){ toast('Las ventas deben ser mayores que 0'); return; }
 
  var conPar=calcPars.filter(function(p){return p.par>0;});
  if(!conPar.length){ toast('Introduce el PAR de al menos un producto'); return; }
 
  var factor=vobj/vbase;
  var pctCambio=Math.round((factor-1)*100);
  var pctTxt=pctCambio>=0?'+'+pctCambio+'%':pctCambio+'%';
  var factorTxt=factor.toFixed(3);
 
  var res='<div class="resultado-box">'
    +'<div class="resultado-titulo">✅ Resultado del cálculo</div>'
    +'<div class="resultado-grid">'
    +'<div class="resultado-item"><div class="resultado-num">'+vbase.toLocaleString('es-ES')+'€</div><div class="resultado-lbl">Venta base</div></div>'
    +'<div class="resultado-item"><div class="resultado-num">'+vobj.toLocaleString('es-ES')+'€</div><div class="resultado-lbl">Venta objetivo</div></div>'
    +'</div>'
    +'<div class="resultado-factor">'
    +'Factor de ajuste: <b>×'+factorTxt+'</b> ('+pctTxt+')<br>'
    +'PAR ideal = PAR base × '+factorTxt
    +'</div>'
    +'</div>'
    +'<div class="calc-section">'
    +'<div class="calc-title">PAR ideal por producto</div>'
    +'<table class="prod-calc-table">'
    +'<thead><tr><th>Producto</th><th style="text-align:center">PAR base</th><th style="text-align:right">PAR ideal</th></tr></thead>'
    +'<tbody>'
    +conPar.map(function(p){
      var parIdeal=Math.round(p.par*factor);
      var diff=parIdeal-p.par;
      var badge=diff>0
        ?'<span class="par-nuevo-badge">+'+diff+'</span>'
        :diff<0
        ?'<span class="par-igual-badge">'+diff+'</span>'
        :'<span class="par-igual-badge">=</span>';
      var clsIdeal=diff>0?'par-up':diff<0?'par-down':'';
      return '<tr>'
        +'<td>'+p.nombre+'<br><span style="font-size:10px;color:var(--text2)">'+p.unidad+'</span></td>'
        +'<td style="text-align:center">'+p.par+'</td>'
        +'<td><span class="'+clsIdeal+'">'+parIdeal+'</span>'+badge+'</td>'
        +'</tr>';
    }).join('')
    +'</tbody></table>'
    +'</div>'
    +'<button class="btn btn-k" id="btn-aplicar-par">Aplicar PAR ideal al inventario ▶</button>'
    +'<div class="warn-calc" style="margin-top:8px">⚠️ Esto actualizará el PAR de todos los productos en el inventario con los valores calculados.</div>';
 
  el('calc-resultado').innerHTML=res;
  el('btn-aplicar-par').addEventListener('click',function(){
    aplicarParIdeal(factor, conPar);
  });
}
 
function aplicarParIdeal(factor, conPar){
  var aplicados=0;
  conPar.forEach(function(cp){
    var parIdeal=Math.round(cp.par*factor);
    prods.forEach(function(p){
      if(p.nombre===cp.nombre){
        p.par=parIdeal;
        p.parAnt=parIdeal;
        aplicados++;
      }
    });
  });
  saveP();
  toast('PAR ideal aplicado a '+aplicados+' productos ✓');
  el('calc-resultado').innerHTML='<div class="resultado-box" style="border-color:var(--green);background:var(--green-bg)">'
    +'<div class="resultado-titulo" style="color:var(--green)">✓ PAR actualizado en el inventario</div>'
    +'<div style="font-size:13px;color:var(--green)">Se ha aplicado el PAR ideal a <b>'+aplicados+' productos</b>.<br>Puedes ajustarlos manualmente en el próximo inventario.</div>'
    +'</div>';
}
 
// ── INIT ──
loadAll();
renderInv();
</script>
